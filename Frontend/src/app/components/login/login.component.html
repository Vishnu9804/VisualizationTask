<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Sign in to visualize your cloud infrastructure</p>
    </div>

    <div *ngIf="errorMessage" class="alert error">
      <span class="icon">⚠️</span> {{ errorMessage }}
    </div>

    <form (ngSubmit)="login()" #loginForm="ngForm" class="auth-form">
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          placeholder="you@example.com" 
          required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-input-wrapper">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            id="password" 
            name="password" 
            [(ngModel)]="password" 
            placeholder="Enter your password" 
            required>
          <button type="button" class="toggle-btn" (click)="togglePasswordVisibility()" title="Toggle Password">
            {{ showPassword ? '🚫' : '👁️' }}
          </button>
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

    </form>
    
    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register">Create one</a></p>
    </div>
  </div>
</div>
